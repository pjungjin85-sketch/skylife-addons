<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스카이라이프 모바일 부가서비스 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#E60012;--red2:#CC0010;--red-light:#FFF5F5;--red-border:#FFCCCC;--black:#1A1A1A;--dark:#333333;--mid:#666666;--light:#999999;--bg:#FFFFFF;--bg2:#F7F7F7;--bg3:#FAFAFA;--border:#E8E8E8;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-hover:0 8px 28px rgba(0,0,0,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg2);color:var(--dark);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--bg);border-top:3px solid var(--red);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;height:56px;gap:12px;}
.logo-badge{background:var(--red);color:#fff;font-weight:900;font-size:12px;padding:4px 10px;border-radius:4px;white-space:nowrap;}
.header-title{font-size:15px;font-weight:700;color:var(--dark);}
.header-count{font-size:12px;color:var(--light);margin-left:auto;white-space:nowrap;}

/* CONTROLS */
.controls-wrap{max-width:1200px;margin:0 auto;padding:20px 20px 0;}
.controls-row1{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:360px;}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px 9px 36px;color:var(--dark);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--red);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--light);font-size:14px;}
.reset-btn{padding:7px 14px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--red-border);background:var(--red-light);color:var(--red);font-family:inherit;transition:all .2s;}
.reset-btn:hover{background:rgba(230,0,18,.15);}

.controls-row2{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px;}
.row-label{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.04em;margin-right:2px;white-space:nowrap;}
.filter-btn{padding:7px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--mid);transition:all .2s;font-family:inherit;white-space:nowrap;}
.filter-btn:hover{border-color:var(--red-border);color:var(--dark);}
.filter-btn.active{background:var(--red);color:#fff;border-color:transparent;}

/* STATS */
.stats-bar{max-width:1200px;margin:12px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;}
.stat-chip{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 12px;font-size:12px;color:var(--mid);box-shadow:var(--shadow);}
.stat-chip .num{font-weight:700;color:var(--red);}

/* GRID */
main{max-width:1200px;margin:20px auto;padding:0 20px 60px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.card.free::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#10b981,#34d399);}
.card.paid::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red2),var(--red));}
.card.once::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d97706,#fbbf24);}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-name{font-size:14px;font-weight:700;color:var(--black);line-height:1.4;}
.price-badge{font-size:13px;font-weight:700;white-space:nowrap;text-align:right;flex-shrink:0;}
.price-badge.free-price{color:#059669;}
.price-badge.paid-price{color:var(--red);}
.price-badge.once-price{color:#d97706;}

.card-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.02em;}
.tag-cat{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);}
.tag-free{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.2);}
.tag-paid{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);}
.tag-once{background:rgba(217,119,6,.1);color:#d97706;border:1px solid rgba(217,119,6,.2);}
.tag-auto{background:rgba(99,102,241,.1);color:#6366f1;border:1px solid rgba(99,102,241,.2);}

.card-desc{font-size:12px;color:var(--mid);line-height:1.6;}
.card-note{font-size:11px;color:var(--light);line-height:1.5;margin-top:2px;}

/* SECTION HEADER */
.section-head{display:flex;align-items:center;gap:10px;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.section-title{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--red);}
.section-count{font-size:11px;color:var(--mid);background:var(--bg2);padding:2px 8px;border-radius:10px;}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--mid);}
.empty-icon{font-size:48px;margin-bottom:14px;}
.empty-text{font-size:15px;font-weight:600;margin-bottom:6px;}
.empty-sub{font-size:12px;}

/* FOOTER */
footer{text-align:center;padding:24px 20px;font-size:11px;color:var(--light);border-top:1px solid var(--border);background:var(--bg);}

/* MOBILE */
@media(max-width:767px){
  .header-title{font-size:13px;}
  .controls-row1,.controls-row2{flex-direction:column;align-items:stretch;}
  .search-wrap{max-width:100%;}
  .controls-row2{flex-direction:row;flex-wrap:wrap;}
  .grid{grid-template-columns:1fr;}
  .stats-bar{gap:6px;}
  .stat-chip{font-size:11px;padding:5px 10px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo-badge">SKY Life</span>
    <span class="header-title">모바일 부가서비스 안내</span>
    <span class="header-count" id="headerCount"></span>
  </div>
</header>

<div class="controls-wrap">
  <div class="controls-row1">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="서비스명, 설명 검색…" oninput="applyFilters()">
    </div>
    <button class="reset-btn" onclick="resetFilters()">필터 초기화</button>
  </div>
  <div class="controls-row2">
    <span class="row-label">카테고리</span>
    <button class="filter-btn active" data-cat="전체" onclick="setCat(this)">전체</button>
    <button class="filter-btn" data-cat="통화편의" onclick="setCat(this)">통화편의</button>
    <button class="filter-btn" data-cat="차단/보안" onclick="setCat(this)">차단·보안</button>
    <button class="filter-btn" data-cat="데이터" onclick="setCat(this)">데이터</button>
    <button class="filter-btn" data-cat="로밍" onclick="setCat(this)">로밍</button>
    <button class="filter-btn" data-cat="OTT/음악" onclick="setCat(this)">OTT·음악</button>
    <button class="filter-btn" data-cat="알림" onclick="setCat(this)">알림</button>
    <button class="filter-btn" data-cat="번호" onclick="setCat(this)">번호</button>
    <button class="filter-btn" data-cat="안전/위치" onclick="setCat(this)">안전·위치</button>
  </div>
  <div class="controls-row2">
    <span class="row-label">요금</span>
    <button class="filter-btn active" data-price="전체" onclick="setPrice(this)">전체</button>
    <button class="filter-btn" data-price="무료" onclick="setPrice(this)">무료</button>
    <button class="filter-btn" data-price="유료" onclick="setPrice(this)">유료 (월정액)</button>
    <button class="filter-btn" data-price="1회성" onclick="setPrice(this)">1회성</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-chip">전체 <span class="num" id="statTotal">-</span>건</div>
  <div class="stat-chip">무료 <span class="num" id="statFree">-</span></div>
  <div class="stat-chip">월정액 유료 <span class="num" id="statPaid">-</span></div>
  <div class="stat-chip">1회성 <span class="num" id="statOnce">-</span></div>
</div>

<main>
  <div id="container"></div>
</main>

<footer>Created by 박정진 &nbsp;|&nbsp; 스카이라이프 모바일 부가서비스 안내</footer>

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let activeCat   = '전체';
let activePrice = '전체';

function setCat(btn){
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  applyFilters();
}
function setPrice(btn){
  document.querySelectorAll('[data-price]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activePrice = btn.dataset.price;
  applyFilters();
}
function resetFilters(){
  document.getElementById('searchInput').value='';
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-cat="전체"]').classList.add('active');
  document.querySelectorAll('[data-price]').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-price="전체"]').classList.add('active');
  activeCat='전체'; activePrice='전체';
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = ADDONS.filter(a=>{
    const matchCat   = activeCat==='전체' || a.cat===activeCat;
    const matchPrice = activePrice==='전체' || a.priceType===activePrice;
    const matchQ     = !q || a.name.toLowerCase().includes(q) || (a.desc||'').toLowerCase().includes(q) || a.cat.toLowerCase().includes(q);
    return matchCat && matchPrice && matchQ;
  });
  renderCards(filtered);
  updateStats(filtered);
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
const CATS = ['통화편의','차단/보안','데이터','로밍','OTT/음악','알림','번호','안전/위치'];

function renderCards(list){
  const container = document.getElementById('container');
  if(!list.length){
    container.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">검색 결과가 없습니다</div><div class="empty-sub">다른 검색어나 필터를 시도해 보세요</div></div>`;
    document.getElementById('headerCount').textContent='';
    return;
  }

  // group by category
  const groups = {};
  CATS.forEach(c=>{groups[c]=[];});
  list.forEach(a=>{ if(groups[a.cat]) groups[a.cat].push(a); });

  let html='';
  CATS.forEach(cat=>{
    const items = groups[cat];
    if(!items.length) return;
    html += `<div class="section-head"><span class="section-title">${cat}</span><span class="section-count">${items.length}건</span></div>`;
    html += '<div class="grid">';
    items.forEach(a=>{
      const cls = a.priceType==='무료'?'free':a.priceType==='1회성'?'once':'paid';
      const priceCls = a.priceType==='무료'?'free-price':a.priceType==='1회성'?'once-price':'paid-price';
      const tagType = a.priceType==='무료'?'tag-free':a.priceType==='1회성'?'tag-once':'tag-paid';
      html+=`
      <div class="card ${cls}">
        <div class="card-head">
          <div class="card-name">${a.name}</div>
          <div class="price-badge ${priceCls}">${a.price}</div>
        </div>
        <div class="card-tags">
          <span class="tag tag-cat">${a.cat}</span>
          <span class="tag ${tagType}">${a.priceType==='무료'?'무료':a.priceType==='1회성'?'1회성':'월정액'}</span>
          ${a.auto?'<span class="tag tag-auto">자동가입</span>':''}
        </div>
        <div class="card-desc">${a.desc}</div>
        ${a.note?`<div class="card-note">※ ${a.note}</div>`:''}
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
  document.getElementById('headerCount').textContent = `총 ${list.length}건`;
}

function updateStats(list){
  document.getElementById('statTotal').textContent = list.length;
  document.getElementById('statFree').textContent  = list.filter(a=>a.priceType==='무료').length+'건';
  document.getElementById('statPaid').textContent  = list.filter(a=>a.priceType==='유료').length+'건';
  document.getElementById('statOnce').textContent  = list.filter(a=>a.priceType==='1회성').length+'건';
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
applyFilters();
